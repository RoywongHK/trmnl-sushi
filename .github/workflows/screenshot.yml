name: Auto Screenshot Sushi
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # 核心修正：為 Linux 系統安裝中文字型，防止亂碼和豆腐塊
      - name: Install Chinese Fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-wqy-zenhei

      - name: Install Dependencies
        run: |
          npm init -y
          npm install puppeteer axios form-data

      - name: Take Screenshot
        run: |
          node -e "
          const puppeteer = require('puppeteer');
          (async () => {
            const browser = await puppeteer.launch({ 
              headless: true,
              args: ['--no-sandbox', '--disable-setuid-sandbox']
            });
            const page = await browser.newPage();
            
            await page.setViewport({ width: 800, height: 480 });
            await page.goto('https://web.app', { waitUntil: 'networkidle0' });
            
            // 額外等待 5 秒確保資料加載完畢
            await new Promise(r => setTimeout(r, 5000));
            
            // 強制變黑白
            await page.addStyleTag({ content: 'body { filter: grayscale(100%) !important; }' });
            
            await page.screenshot({ path: 'sushi.png' });
            await browser.close();
          })();
          "

      - name: Commit and Push Image
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add sushi.png
          git commit -m "Update sushi queue screenshot with Chinese fonts" || exit 0
          git push
