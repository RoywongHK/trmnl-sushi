name: Auto Screenshot Sushi
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      # 核心修正：明確指定使用相容 Node 24 的 checkout 版本，消滅所有 Deprecated 警告
      - name: Checkout repo
        uses: actions/checkout@v4.2.2

      - name: Install Fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-wqy-zenhei

      - name: Install Dependencies
        run: |
          npm init -y
          npm install puppeteer

      - name: Take Screenshot
        run: |
          node -e "
          const puppeteer = require('puppeteer');
          (async () => {
            const browser = await puppeteer.launch({ 
              headless: true,
              args: ['--no-sandbox', '--disable-setuid-sandbox']
            });
            const page = await browser.newPage();
            
            await page.setExtraHTTPHeaders({ 'Accept-Language': 'zh-HK,zh;q=0.9' });
            await page.setViewport({ width: 800, height: 480 });
            
            await page.goto('https://web.app', { waitUntil: 'networkidle0' });
            
            await new Promise(r => setTimeout(r, 6000));
            
            // 輸出彩色源圖
            await page.addStyleTag({ content: 'body { background: #ffffff !important; }' });
            
            await page.screenshot({ path: 'sushi.png' });
            await browser.close();
          })();
          "

      - name: Commit and Push Image
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add sushi.png
          git commit -m "Change screenshot to full color and clear node20 warnings" || exit 0
          git push
