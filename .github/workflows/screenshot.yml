name: Auto Screenshot Sushi
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          npm init -y
          npm install puppeteer axios form-data

      - name: Take Screenshot
        run: |
          node -e "
          const puppeteer = require('puppeteer');
          (async () => {
            const browser = await puppeteer.launch({ 
              headless: true,
              args: ['--no-sandbox', '--disable-setuid-sandbox']
            });
            const page = await browser.newPage();
            
            // 1. 設定符合 TRMNL 的 800x480 解析度
            await page.setViewport({ width: 800, height: 480 });
            
            // 2. 修正網址：前往真正的壽司郎排隊頁面
            await page.goto('https://sushirolic.web.app/desktop.html', { waitUntil: 'networkidle0' });
            
            // 3. 額外等待 5 秒，確保動態排隊資料完全載入完畢
            await new Promise(r => setTimeout(r, 5000));
            
            // 4. 強制變黑白
            await page.addStyleTag({ content: 'body { filter: grayscale(100%) !important; }' });
            
            // 5. 截圖儲存
            await page.screenshot({ path: 'sushi.png' });
            await browser.close();
          })();
          "

      - name: Commit and Push Image
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add sushi.png
          git commit -m "Update sushi queue screenshot" || exit 0
          git push
