name: Auto Screenshot Sushi
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # 1. 下載 Linux 系統最標準的中文字型包
      - name: Install Fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-wqy-zenhei

      - name: Install Dependencies
        run: |
          npm init -y
          npm install puppeteer

      - name: Take Screenshot
        run: |
          node -e "
          const puppeteer = require('puppeteer');
          (async () => {
            const browser = await puppeteer.launch({ 
              headless: true,
              args: ['--no-sandbox', '--disable-setuid-sandbox']
            });
            const page = await browser.newPage();
            
            // 2. 透過設定 Header 確保網站載入繁體中文
            await page.setExtraHTTPHeaders({ 'Accept-Language': 'zh-HK,zh;q=0.9' });
            await page.setViewport({ width: 800, height: 480 });
            
            await page.goto('https://sushirolic.web.app/desktop.html', { waitUntil: 'networkidle0' });
            
            // 3. 穩定等待 6 秒，確保 Firebase 數據與中文字型完全結合
            await new Promise(r => setTimeout(r, 6000));
            
            // 4. 極簡黑白濾鏡，避免引發 CSS 語法崩潰
            await page.addStyleTag({ content: 'body { background: #ffffff !important; }' });
            
            await page.screenshot({ path: 'sushi.png' });
            await browser.close();
          })();
          "

      - name: Commit and Push Image
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add sushi.png
          git commit -m "Fix Chinese font bug" || exit 0
          git push
