name: Auto Screenshot Sushi
on:
  schedule:
    # 每 15 分鐘自動執行一次 (可根據需求調整)
    - cron: '*/15 * * * *'
  workflow_dispatch: # 允許手動點擊按鈕執行

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Puppeteer
        run: npm install puppeteer

      - name: Take Screenshot
        run: |
          node -e "
          const puppeteer = require('puppeteer');
          (async () => {
            const browser = await puppeteer.launch({ headless: 'new' });
            const page = await browser.newPage();
            await page.setViewport({ width: 800, height: 480 });
            
            // 載入壽司郎排隊網頁，並等待所有網路請求完成（確保JS載入完畢）
            await page.goto('https://web.app', { waitUntil: 'networkidle0' });
            
            // 注入 CSS 讓畫面強制變黑白，更適合電子墨水屏
            await page.addStyleTag({ content: 'body { filter: grayscale(100%) !important; }' });
            
            // 截圖儲存
            await page.screenshot({ path: 'sushi.png' });
            await browser.close();
          })();
          "

      - name: Commit and Push Image
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add sushi.png
          git commit -m "Update sushi queue screenshot" || exit 0
          git push
